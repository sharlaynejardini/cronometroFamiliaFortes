<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avisos | Famílias Fortes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app notices-app">
    <section class="hero notices-hero">
      <div class="hero-copy">
        <p class="eyebrow">Avisos importantes</p>
        <h1>Junho Violeta</h1>
        <p class="subtitle">Materiais de conscientização sobre a violência contra a pessoa idosa, organizados para apresentação em ordem.</p>
        <div class="home-actions">
          <a class="ghost-link" href="index.html">Voltar para a home</a>
        </div>
      </div>
      <div class="hero-art">
        <img src="imagens/aviso-1.jpeg" alt="Campanha Junho Violeta">
      </div>
    </section>

    <section class="notices-gallery" aria-label="Imagens de avisos">
      <article class="notice-slide">
        <span class="notice-number">01</span>
        <img src="imagens/aviso-1.jpeg" alt="Junho Violeta: conscientização da violência contra a pessoa idosa">
      </article>

      <article class="notice-slide">
        <span class="notice-number">02</span>
        <img src="imagens/aviso-2.jpeg" alt="Aviso sobre violência física, abuso psicológico e negligência">
      </article>

      <article class="notice-slide">
        <span class="notice-number">03</span>
        <img src="imagens/aviso-3.jpeg" alt="Aviso sobre abandono, violência institucional e abuso financeiro e patrimonial">
      </article>

      <article class="notice-slide">
        <span class="notice-number">04</span>
        <img src="imagens/aviso-4.jpeg" alt="Aviso sobre violência sexual, discriminação e Disque 100">
      </article>
    </section>
  </main>
</body>
</html>
